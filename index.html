<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SchoolQuest</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 90%;
  max-width: 800px;
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

.cards {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.card {
  flex: 1;
  padding: 15px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.easy { background: #4CAF50; }
.medium { background: #ff9800; }
.hard { background: #f44336; }

#selected {
  margin-top: 20px;
  font-size: 20px;
}

.bar {
  height: 12px;
  background: #00ffcc;
  border-radius: 6px;
  margin-top: 10px;
  width: 100%;
}

.barContainer {
  background: rgba(255,255,255,0.2);
  border-radius: 6px;
  overflow: hidden;
}

button {
  margin: 10px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

.vote {
  display: none;
}

#coins {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎮 SchoolQuest</h1>

  <div class="cards" id="cards"></div>

  <div id="selected"></div>

  <div class="barContainer">
    <div class="bar" id="bar"></div>
  </div>

  <div id="timer"></div>

  <div>
    <button class="vote" id="up" onclick="vote(true)">👍</button>
    <button class="vote" id="down" onclick="vote(false)">👎</button>
  </div>

  <div id="coins">Coins: 0</div>
</div>

<script src="script.js"></script>
</body>
</html>
