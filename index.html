<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SchoolQuest</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(160deg, #1a1a2e, #16213e);
  color: white;
  height: 100vh;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 40px;
}

.cards {
  display: flex;
  flex: 1;
  gap: 20px;
}

.card {
  flex: 1;
  border-radius: 20px;
  padding: 30px;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.locked {
  opacity: 0.5;
  pointer-events: none;
}

.selected {
  outline: 4px solid white;
}

#bottom {
  text-align: center;
}

.barContainer {
  width: 100%;
  height: 15px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
  margin: 10px 0;
}

.bar {
  height: 100%;
  width: 100%;
  background: #00ffcc;
}

button {
  padding: 15px 25px;
  margin: 10px;
  font-size: 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.vote {
  display: none;
}

#coins {
  font-size: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎮 SchoolQuest</h1>

  <div class="cards" id="cards"></div>

  <div id="bottom">
    <div class="barContainer">
      <div class="bar" id="bar"></div>
    </div>

    <div id="timer"></div>

    <button class="vote" id="up" onclick="vote(true)">👍</button>
    <button class="vote" id="down" onclick="vote(false)">👎</button>

    <div id="coins">Coins: 0</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
